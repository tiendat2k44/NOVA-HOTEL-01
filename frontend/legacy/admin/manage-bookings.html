<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đặt phòng | NOVA HOTEL Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <div data-component="header"></div>

  <main class="section-pad pt-5 dashboard-shell">
    <div class="container-fluid px-4">
      <div class="row g-4">
        <aside class="col-lg-3 dashboard-aside" data-reveal>
          <div class="panel-card sidebar-admin rounded-4 p-4 h-100">
            <div class="brand-mark text-white mb-4">NOVA HOTEL</div>
            <nav class="nav flex-column">
              <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
              <a class="nav-link" href="manage-rooms.html"><i class="bi bi-door-open me-2"></i>Quản lý phòng</a>
              <a class="nav-link active" href="manage-bookings.html"><i class="bi bi-calendar2-check me-2"></i>Quản lý đặt phòng</a>
              <a class="nav-link" href="manage-users.html"><i class="bi bi-people me-2"></i>Quản lý người dùng</a>
              <a class="nav-link" href="revenue-report.html"><i class="bi bi-graph-up-arrow me-2"></i>Doanh thu</a>
            </nav>
          </div>
        </aside>
        <section class="col-lg-9" data-reveal>
          <div class="dashboard-hero mb-4">
            <div class="dashboard-topline mb-0">
              <div>
                <span class="kicker text-white">Quản lý</span>
                <h1 class="section-title mt-3 mb-2">Danh sách booking</h1>
                <p class="section-subtitle ms-0 mb-0">Điều phối trạng thái đặt phòng với bảng quản lý rõ ràng, hỗ trợ lọc nhanh và cập nhật tức thời.</p>
              </div>
              <div class="badge-luxury bg-white text-dark">Reservation Control</div>
            </div>
          </div>
          <div class="content-card">
            <div class="row g-3 align-items-end mb-4">
              <div class="col-md-4">
                <label class="form-label text-dark">Tìm booking</label>
                <input class="form-control" type="text" placeholder="Mã booking, khách, phòng..." data-admin-booking-search>
              </div>
              <div class="col-md-4">
                <label class="form-label text-dark">Lọc theo trạng thái</label>
                <select class="form-select" data-admin-booking-filter-status>
                  <option value="">-- Tất cả trạng thái --</option>
                  <option value="pending">Chờ xác nhận</option>
                  <option value="confirmed">Đã xác nhận</option>
                  <option value="completed">Hoàn tất</option>
                  <option value="cancelled">Đã hủy</option>
                </select>
              </div>
              <div class="col-md-4 text-md-end">
                <button class="btn-luxury btn-luxury-outline w-100 w-md-auto" type="button">Xuất Excel</button>
              </div>
            </div>
            <div class="table-responsive">
              <table class="table table-hover align-middle table-luxury mb-0">
                <thead>
                  <tr>
                    <th>Mã</th>
                    <th>Khách</th>
                    <th>Phòng</th>
                    <th>Nhận</th>
                    <th>Trả</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Cập nhật</th>
                  </tr>
                </thead>
                <tbody data-admin-booking-table></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div data-component="footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>
</html>
