# ================== THÔNG TIN ỨNG DỤNG ==================
spring.application.name=nova-hotel-backend
server.port=8080
# Lưu ý: tạm thời bỏ context-path để tránh mapping kép (/api/api/...)
# Nếu bạn muốn đặt context-path riêng, hãy đảm bảo các @RequestMapping không bắt
# đầu bằng /api để tránh bị lồng.
# server.servlet.context-path=/api

# ================== MONGODB ==================
spring.data.mongodb.uri=mongodb://localhost:27017/nova_hotel_db
spring.data.mongodb.database=nova_hotel_db

# ================== JWT ==================
jwt.secret=SuperSecretKeyNovaHotel2026ChangeThisInProduction12345
jwt.expiration=86400000

# ================== LOGGING (để debug dễ) ==================
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.novahotel=DEBUG

# ================== CORS (cho React sau này) ==================
spring.web.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true