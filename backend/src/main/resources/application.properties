# ================== THÔNG TIN ỨNG DỤNG ==================
spring.application.name=nova-hotel-backend
server.port=8080
# Lưu ý: tạm thời bỏ context-path để tránh mapping kép (/api/api/...)
# Nếu bạn muốn đặt context-path riêng, hãy đảm bảo các @RequestMapping không bắt
# đầu bằng /api để tránh bị lồng.
# server.servlet.context-path=/api

# ================== MONGODB ==================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=nova_hotel_db

# ================== JWT ==================
jwt.secret=SuperSecretKeyNovaHotel2026ChangeThisInProduction12345
jwt.expiration=86400000

# ================== LOGGING (để debug dễ) ==================
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.novahotel=DEBUG

# ================== CORS ==================
# Lưu ý: Cấu hình chính nằm trong SecurityConfig.java (corsConfigurationSource)
# và WebConfig.java. Danh sách dưới đây chỉ mang tính tài liệu.
spring.web.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# ================== GOOGLE OAUTH (for /auth/google) ==================
# Đặt Google Client ID thật của bạn (từ Google Cloud Console)
google.client-id=your-google-client-id.apps.googleusercontent.com
# Ví dụ: 1234567890-abc123def456.apps.googleusercontent.com

# ================== EMAIL (Spring Mail) - Đặt thật để gửi email xác nhận booking ==================
# Demo: nếu để trống hoặc mail.enabled=false sẽ chỉ log ra console (giống reset password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=datdao.k63cntt-a@utb.edu.vn
spring.mail.password=owwq ggwv aezq ypxn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# Bật/tắt gửi email thật (mặc định true nếu cấu hình host)
mail.enabled=true

# Jackson config to allow partial updates (e.g. only sending {status: "xxx"} for rooms)
# Prevents "Cannot map null into type int" when using primitive fields in models for PATCH-like updates
spring.jackson.deserialization.fail-on-null-for-primitives=false
spring.jackson.deserialization.fail-on-unknown-properties=false
# Email người nhận thông báo admin (tùy chọn)
hotel.admin-email=admin@novahotel.vn

# ================== HOTEL BANK & VIETQR (cho QR thanh toán tại checkout) ==================
# Cấu hình tài khoản nhận tiền chuyển khoản của khách sạn
# Ví dụ Vietcombank: bin=970436, accountNo=0123456789
hotel.bank.bin=970407
hotel.bank.account-no=123456788805
hotel.bank.account-name=DAO TIEN DAT
hotel.bank.name=TECHCOMBANK
# Template style cho vietqr.io (compact2, compact, qr_only, etc.)
hotel.bank.qr-template=compact2

# ================== MULTIPART UPLOAD (cho upload ảnh phòng từ admin) ==================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true